[package]
name = "warstonks"
version = "3.0.0"
description = "WarStonks v3 — Warframe market assistant"
authors = []
edition = "2021"

[lib]
name = "warstonks_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
